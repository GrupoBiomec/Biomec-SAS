name: Testes e Cobertura

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar dependências do sistema (display virtual e Qt/PyQt6)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libegl1 libgl1 libglx-mesa0 libxkbcommon-x11-0 libdbus-1-3 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 libxcb-xinput0

    - name: Instalar dependências Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar testes com cobertura
      run: xvfb-run pytest --cov --cov-report=xml --cov-report=term

    - name: Gerar badge de cobertura
      run: genbadge coverage -i coverage.xml -o badges/coverage.svg

    - name: Commit do badge atualizado
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add badges/coverage.svg
        git diff --cached --quiet || git commit -m "ci: atualizar badge de cobertura [skip ci]"
        git push
