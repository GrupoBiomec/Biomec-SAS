name: Tests & Coverage Badge

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Instalar dependências do sistema para PyQt6 headles
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libgl1-mesa-glx libxkbcommon-x11-0 libdbus-1-3 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 libxcb-xinput0

    - name: Instalar dependências do Python
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest-cov "genbadge[all]"

    - name: Executar testes e gerar cobertura
      env:
        QT_QPA_PLATFORM: offscreen
        PYTHONPATH: src
      run: |
        pytest --cov=src --cov-report=xml tests/

    - name: Gerar badge de cobertura
      run: |
        mkdir -p badges
        genbadge coverage -i coverage.xml -o badges/coverage.svg

    - name: Commit e push do badge de cobertura
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add badges/coverage.svg
        git commit -m "chore: update coverage badge [skip ci]" || echo "Nenhuma alteração para commitar"
        git push
