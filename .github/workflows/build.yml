name: Gerar Executável Windows

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Gerar .exe com PyInstaller
      run: |
        pyinstaller --noconsole --onefile --paths . --add-data "src/assets/logo.ico;assets" --collect-all ui --collect-all arquivos --icon="src/assets/logo.ico" --name "BiomecSAS" src/main.py

    - name: Upload do Executável para a Release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: dist/BiomecSAS.exe
        asset_name: BiomecSAS.exe
        tag: ${{ github.ref_name }}
        overwrite: true